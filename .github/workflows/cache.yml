name: CI with Cache

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: ~/.cache
          key: cache-3da98bb

      - name: prime-cache-3da98bb
        run: echo "Cache hit? ${{ steps.cache.outputs.cache-hit }}"
